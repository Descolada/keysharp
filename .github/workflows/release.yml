name: Release

on:
  push:
    tags:
      - 'v*.*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: "Four-part release version, for example 0.0.0.15"
        required: true
        type: string
      draft:
        description: "Create or update the release as a draft"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  BUILD_CONFIGURATION: Release
  ETO_REPOSITORY: https://github.com/Descolada/Eto.git
  ETO_BRANCH: Keysharp

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      draft: ${{ steps.version.outputs.draft }}
    steps:
      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.version }}'.Trim()
            $tag = "v$version"
            $draft = '${{ inputs.draft }}'.ToLowerInvariant()
          } else {
            $tag = '${{ github.ref_name }}'
            $version = $tag -replace '^v', ''
            $draft = 'true'
          }

          if ($version -notmatch '^\d+\.\d+\.\d+\.\d+$') {
            throw "Release version must have four numeric parts, for example 0.0.0.15. Got '$version'."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "draft=$draft" >> $env:GITHUB_OUTPUT

  package:
    needs: prepare
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # Exposed as env (not read straight from `secrets` in step `if:`) because the `secrets` context is not
    # available to `if:` expressions. Empty on forks / when the secret is unset, which keeps macOS builds
    # unsigned exactly as before instead of failing.
    env:
      MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
      MACOS_CERT_P12_PASSWORD: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            platform: windows
            os: windows-latest
            rid: win-x64
          - name: Linux x64
            platform: linux
            os: ubuntu-latest
            rid: linux-x64
          - name: Linux arm64
            platform: linux
            os: ubuntu-24.04-arm
            rid: linux-arm64
          - name: macOS arm64
            platform: macos
            os: macos-latest
            rid: osx-arm64

    steps:
      - name: Checkout keysharp
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json

      - name: Resolve latest Eto ref (non-Windows)
        if: ${{ matrix.platform != 'windows' }}
        id: eto-ref
        shell: pwsh
        run: |
          $line = git ls-remote $env:ETO_REPOSITORY "refs/heads/$env:ETO_BRANCH"
          $sha = ($line -split "\s+")[0]
          if (-not $sha) {
            throw "Could not resolve $env:ETO_REPOSITORY branch $env:ETO_BRANCH."
          }
          "sha=$sha" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved Eto $env:ETO_BRANCH to $sha"

      - name: Cache Eto (non-Windows)
        if: ${{ matrix.platform != 'windows' }}
        id: eto-cache
        uses: actions/cache@v5
        with:
          path: ${{ runner.workspace }}/Eto
          key: eto-${{ runner.os }}-${{ steps.eto-ref.outputs.sha }}

      - name: Checkout Eto (non-Windows, cache miss)
        if: ${{ matrix.platform != 'windows' && steps.eto-cache.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: |
          $etoDir = Join-Path $env:RUNNER_WORKSPACE "Eto"
          if (Test-Path $etoDir) {
            Remove-Item -LiteralPath $etoDir -Recurse -Force
          }
          git clone --branch "$env:ETO_BRANCH" --recurse-submodules $env:ETO_REPOSITORY $etoDir
          git -C $etoDir checkout "${{ steps.eto-ref.outputs.sha }}"
          git -C $etoDir submodule update --init --recursive

      - name: Verify Eto checkout (non-Windows)
        if: ${{ matrix.platform != 'windows' }}
        shell: pwsh
        run: |
          $etoDir = Join-Path $env:RUNNER_WORKSPACE "Eto"
          $expected = "${{ steps.eto-ref.outputs.sha }}"
          $current = git -C $etoDir rev-parse HEAD
          if ($current -ne $expected) {
            Write-Host "Cached Eto checkout was $current; updating to $expected."
            git -C $etoDir remote set-url origin $env:ETO_REPOSITORY
            git -C $etoDir fetch origin "$env:ETO_BRANCH"
            git -C $etoDir checkout --force $expected
          }
          if (-not (Test-Path "$etoDir/lib/monomac/src/MonoMac.csproj")) {
            Write-Host "MonoMac submodule missing, initializing..."
          } else {
            Write-Host "MonoMac submodule present."
          }
          git -C $etoDir submodule update --init --recursive

      - name: Install Linux package dependencies
        if: ${{ matrix.platform == 'linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            dbus-x11 \
            dpkg-dev \
            fakeroot \
            libappindicator3-1 \
            libatspi2.0-0 \
            libevdev-dev \
            libglib2.0-dev \
            libgtk-3-0 \
            libnotify4 \
            libudev-dev \
            pkg-config \
            rsync || sudo apt-get install -y \
            build-essential \
            cmake \
            dbus-x11 \
            dpkg-dev \
            fakeroot \
            libayatana-appindicator3-1 \
            libatspi2.0-0 \
            libevdev-dev \
            libglib2.0-dev \
            libgtk-3-0 \
            libnotify4 \
            libudev-dev \
            pkg-config \
            rsync

      - name: Install Visual Studio Installer Projects
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe was not found."
          }

          $vsInstall = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if (-not $vsInstall) {
            throw "Visual Studio with MSBuild was not found."
          }

          $vsixInstaller = Join-Path $vsInstall "Common7\IDE\VSIXInstaller.exe"
          if (-not (Test-Path $vsixInstaller)) {
            throw "VSIXInstaller.exe was not found at $vsixInstaller."
          }

          $vsixPath = Join-Path $env:RUNNER_TEMP "InstallerProjects2022.vsix"
          Invoke-WebRequest `
            -Uri "https://marketplace.visualstudio.com/_apis/public/gallery/publishers/VisualStudioClient/vsextensions/MicrosoftVisualStudio2022InstallerProjects/latest/vspackage" `
            -OutFile $vsixPath

          & $vsixInstaller /quiet /admin $vsixPath
          if ($LASTEXITCODE -ne 0) {
            throw "Visual Studio Installer Projects VSIX install failed with exit code $LASTEXITCODE."
          }

      - name: Publish Windows package
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        env:
          KEYSHARP_VERSION: ${{ needs.prepare.outputs.version }}
          RID: ${{ matrix.rid }}
        run: |
          $assetRoot = Join-Path $PWD "dist/release-assets"
          New-Item -ItemType Directory -Force -Path $assetRoot | Out-Null

          ./Keysharp.Install/package-windows.ps1 `
            -Configuration $env:BUILD_CONFIGURATION `
            -RuntimeIdentifier $env:RID `
            -Version $env:KEYSHARP_VERSION

          $msi = Join-Path $PWD "dist/Keysharp-win-x64.msi"
          if (-not (Test-Path $msi)) {
            throw "Expected MSI was not produced: $msi"
          }
          Copy-Item -LiteralPath $msi -Destination (Join-Path $assetRoot "keysharp-$env:KEYSHARP_VERSION-$env:RID.msi") -Force

          $zip = Join-Path $PWD "dist/Keysharp-win-x64.zip"
          if (-not (Test-Path $zip)) {
            throw "Expected zip was not produced: $zip"
          }
          Copy-Item -LiteralPath $zip -Destination (Join-Path $assetRoot "keysharp-$env:KEYSHARP_VERSION-$env:RID.zip") -Force

      - name: Publish Linux package
        if: ${{ matrix.platform == 'linux' }}
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          RID: ${{ matrix.rid }}
          CONFIG: Release
        run: |
          chmod +x Keysharp.Install/package-linux.sh
          Keysharp.Install/package-linux.sh
          mkdir -p dist/release-assets
          mv "dist/keysharp-${RID}.tar.gz" "dist/release-assets/keysharp-${VERSION}-${RID}.tar.gz"
          # The .deb keeps Debian's name_version_arch convention (e.g. keysharp_0.0.0.15_amd64.deb); rename the
          # release asset to the RID form so it lines up with the tar.gz / .msi / .pkg assets. dpkg reads the arch
          # from the control file, not the filename, so "apt install ./<file>.deb" still works.
          if compgen -G "dist/keysharp_${VERSION}_*.deb" > /dev/null; then
            for deb in dist/keysharp_${VERSION}_*.deb; do
              mv "$deb" "dist/release-assets/keysharp-${VERSION}-${RID}.deb"
            done
          fi

      - name: Import macOS signing certificate
        if: ${{ matrix.platform == 'macos' && env.MACOS_CERT_P12_BASE64 != '' }}
        shell: bash
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/keysharp-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/keysharp-signing.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -base64 24)"

          # Decode the base64-encoded .p12 secret back into a real file.
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          # Sign out of a throwaway keychain instead of the runner's login keychain, so the private key
          # never lands in shared state and the cleanup step can delete the whole keychain afterwards.
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"   # don't auto-lock mid-build
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          # Import the identity and pre-authorize codesign to use its private key without a GUI prompt.
          security import "$CERT_PATH" -P "$MACOS_CERT_P12_PASSWORD" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH" >/dev/null

          # Prepend our keychain to the search list (preserving the existing ones) so that
          # `codesign --sign Keysharp` and `security find-identity` inside package-macos.sh resolve it.
          EXISTING="$(security list-keychains -d user | sed -e 's/^[[:space:]]*//' -e 's/"//g')"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING

          rm -f "$CERT_PATH"

          # Hand the keychain path to the cleanup step so it always gets removed.
          echo "SIGNING_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Publish macOS package
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          RID: ${{ matrix.rid }}
          CONFIG: Release
          # Sign the .app bundles and .dmg with the stable self-signed identity when its cert secret is
          # present; otherwise stay empty so package-macos.sh produces an unsigned build as before.
          APP_CERT: ${{ secrets.MACOS_CERT_P12_BASE64 != '' && 'Keysharp' || '' }}
        run: |
          chmod +x Keysharp.Install/package-macos.sh
          Keysharp.Install/package-macos.sh
          mkdir -p dist/release-assets
          mv "dist/Keysharp-${RID}.pkg" "dist/release-assets/keysharp-${VERSION}-${RID}.pkg"
          mv "dist/Keysharp-${RID}.dmg" "dist/release-assets/keysharp-${VERSION}-${RID}.dmg"

      - name: Remove macOS signing keychain
        if: ${{ always() && matrix.platform == 'macos' && env.SIGNING_KEYCHAIN != '' }}
        shell: bash
        run: security delete-keychain "$SIGNING_KEYCHAIN" || true

      - name: Upload release assets
        uses: actions/upload-artifact@v6
        with:
          name: release-assets-${{ matrix.rid }}
          path: dist/release-assets/*
          if-no-files-found: error

  publish-release:
    needs:
      - prepare
      - package
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    # Job-level block overrides the top-level `contents: write`, so it must be repeated here. id-token +
    # attestations are what actions/attest-build-provenance needs to mint an OIDC-signed provenance and
    # push it to the repo's attestation store.
    permissions:
      contents: write       # create/update the release and upload assets
      id-token: write       # OIDC token used to sign the provenance (Sigstore)
      attestations: write   # write the attestation to the repo's attestation store
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v7
        with:
          pattern: release-assets-*
          path: dist/release-assets
          merge-multiple: true

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist/release-assets
          shopt -s nullglob
          # Bare filenames (not paths) so users can `sha256sum -c SHA256SUMS` from the download folder.
          # The keysharp-* glob self-excludes the SHA256SUMS file being written.
          files=(keysharp-*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found to checksum." >&2
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS
          cat SHA256SUMS

      # Mint SLSA build-provenance attestations binding each asset's digest to this workflow run, so users
      # can `gh attestation verify <file> --repo <owner>/<repo>`. SHA256SUMS is attested too, giving it
      # provenance as well. Bump the major if a newer one ships.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/release-assets/*'

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          DRAFT: ${{ needs.prepare.outputs.draft }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(dist/release-assets/*)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          # This job doesn't check out the repo, so gh can't infer the repository from a local git remote
          # (it shells out to git and fails with "not a git repository"). Pass it explicitly instead.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"
          else
            args=(release create "$TAG" "${assets[@]}" --title "$TAG" --generate-notes --repo "$GITHUB_REPOSITORY")
            if [ "$DRAFT" = "true" ]; then
              args+=(--draft)
            fi
            gh "${args[@]}"
          fi
